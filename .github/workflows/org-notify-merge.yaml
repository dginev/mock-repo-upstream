name: Notify downstream on merge

on:
  push:
    branches: [main, develop]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to concrete downstream repo
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DOWNSTREAMPAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org/mock-repo-downstream/dispatches \
            -d '{"event_type":"repo-upstream-updated","client_payload":{"branch":"${{ github.ref_name }}"}}'
